function Quiz({done}){

const pk=(v)=>{const n={...a,[q.id]:v};sA(n);advance(n)};
const toggle=(v)=>{setSel(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v])};
const confirmMulti=()=>{const n={...a,[q.id]:sel};sA(n);advance(n)};
return(<Sh ch={<div><Nv r={<span className="mono" style={{color:"#475569",fontSize:12}}>{c+1}/{QS.length}</span>}/>

{q.ds&&<p style={{color:"#64748B",fontSize:13,marginBottom:28,lineHeight:1.6}}>{q.ds}</p>}
{!q.ds&&<div style={{height:18}}/>}
{q.t==="sel"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:9}}>{q.os.map(o=><button key={o.v} className={"opt"+(a[q.id]===o.v?" oa":"")} onClick={()=>pk(o.v)} style={{padding:"13px 16px",fontSize:14,textAlign:"left"}}>{o.l}</button>)}</div>}
{q.t==="yn"&&<div style={{display:"flex",gap:12}}>{[{l:"Sì",v:"yes"},{l:"No",v:"no"},...(!q.cp?[{l:"Non so",v:"un"}]:[])].map(o=><button key={o.v} className={"opt"+(a[q.id]===o.v?" oa":"")} onClick={()=>pk(o.v)} style={{flex:1,padding:"15px 18px",fontSize:15,fontWeight:500,textAlign:"center"}}>{o.l}</button>)}</div>}

{q.os.map(o=><button key={o.v} className={"opt"+(sel.includes(o.v)?" oa":"")} onClick={()=>toggle(o.v)}
  style={{padding:"13px 16px",fontSize:14,textAlign:"left",display:"flex",alignItems:"center",gap:10}}>

  {o.l}
</button>)}
</div>
<button className="bp" onClick={confirmMulti} style={{width:"100%",padding:"14px 0"}}>{sel.length===0?"Nessuno di questi — Avanti →":"Conferma "+sel.length+" strumento/i →"}</button>

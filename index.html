<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIComply.it — Verifica la compliance AI Act della tua azienda</title>
<meta name="description" content="Verifica gratuitamente se la tua azienda è a norma con la Legge Europea sull'IA (AI Act). Report immediato, obblighi specifici, punteggio di compliance.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;overflow-x:hidden;background:#060910}
.glow{text-shadow:0 0 60px rgba(59,130,246,0.15)}
.card{transition:all 0.25s ease;border:1px solid rgba(255,255,255,0.05)}
.card:hover{border-color:rgba(59,130,246,0.25);transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,0,0,0.2)}
.pulse-btn{animation:pulse 2.8s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,0.35)}50%{box-shadow:0 0 0 14px rgba(59,130,246,0)}}
.mono{font-family:'Space Mono',monospace}
.opt{transition:all 0.2s ease;border:1px solid rgba(255,255,255,0.07);cursor:pointer;font-family:'DM Sans',sans-serif}
.opt:hover{border-color:rgba(59,130,246,0.4);background:rgba(59,130,246,0.05)}
.fade{opacity:0;transform:translateY(16px);animation:fadeUp 0.5s ease forwards}
.d1{animation-delay:0.15s}.d2{animation-delay:0.3s}.d3{animation-delay:0.45s}.d4{animation-delay:0.6s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
button{font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const TIMELINE = [
  {date:"1 agosto 2024",label:"Entrata in vigore della Legge sull'IA",status:"done"},
  {date:"2 febbraio 2025",label:"Pratiche vietate + obbligo alfabetizzazione IA",status:"done"},
  {date:"2 agosto 2025",label:"Regole governance + obblighi modelli GPAI",status:"done"},
  {date:"2 agosto 2026",label:"Sistemi ad alto rischio + obblighi trasparenza",status:"upcoming"},
  {date:"2 agosto 2027",label:"Sistemi ad alto rischio in prodotti regolamentati",status:"future"},
];

const PROHIBITED = [
  "Manipolazione e inganno dannosi basati sull'IA",
  "Sfruttamento dannoso delle vulnerabilità basato sull'IA",
  "Punteggio sociale (social scoring)",
  "Valutazione o previsione del rischio di reato individuale",
  "Scraping non mirato di Internet o CCTV per banche dati di riconoscimento facciale",
  "Riconoscimento delle emozioni nei luoghi di lavoro e negli istituti di istruzione",
  "Categorizzazione biometrica per dedurre caratteristiche protette",
  "Identificazione biometrica remota in tempo reale in spazi pubblici",
];

const SANCTIONS = [
  {amount:"35 milioni o 7%",desc:"Per pratiche vietate e mancata cooperazione con le autorità",level:"max"},
  {amount:"15 milioni o 3%",desc:"Per violazione degli obblighi principali (inclusa mancata alfabetizzazione IA)",level:"mid"},
  {amount:"7,5 milioni o 1,5%",desc:"Per violazioni procedurali (documentazione inesatta, mancate informazioni)",level:"low"},
];

const QUESTIONS = [
  {id:"sector",question:"In quale settore opera la tua azienda?",type:"select",
    options:[
      {label:"Servizi e consulenza",value:"servizi",risk:0},
      {label:"Commercio e retail",value:"commercio",risk:1},
      {label:"Ristorazione e hospitality",value:"ristorazione",risk:0},
      {label:"Manifattura e produzione",value:"manifattura",risk:1},
      {label:"Sanità e benessere",value:"sanita",risk:2},
      {label:"Edilizia e artigianato",value:"edilizia",risk:0},
      {label:"Tech e digitale",value:"tech",risk:2},
      {label:"Finanza, credito e assicurazioni",value:"finanza",risk:3},
      {label:"Istruzione e formazione",value:"formazione",risk:2},
      {label:"Risorse umane e recruiting",value:"hr_sector",risk:3},
      {label:"Altro",value:"altro",risk:0},
    ]},
  {id:"employees",question:"Quanti dipendenti ha la tua azienda?",type:"select",
    options:[
      {label:"Solo io (freelance/autonomo)",value:"1",risk:0},
      {label:"2-9 dipendenti",value:"2-9",risk:1},
      {label:"10-49 dipendenti",value:"10-49",risk:2},
      {label:"50-249 dipendenti",value:"50-249",risk:3},
    ]},
  {id:"chatgpt",question:"Tu o i tuoi dipendenti usate strumenti di IA generativa per lavoro?",
    description:"Es: ChatGPT, Gemini, Copilot, Claude — per scrivere email, generare testi, analizzare dati, tradurre, creare immagini",
    type:"yesno",riskYes:2,riskNo:0,category:"gpai",
    aiSystem:"IA Generativa (ChatGPT, Gemini, Copilot, Claude, Midjourney)",
    obligation:"Obbligo di trasparenza: i contenuti generati dall'IA devono essere identificabili. Obbligo di alfabetizzazione IA per il personale (già in vigore)."},
  {id:"chatbot",question:"Hai un chatbot o assistente virtuale che interagisce con clienti o utenti?",
    description:"Qualsiasi sistema automatizzato che conversa con le persone — su sito web, WhatsApp, social, app",
    type:"yesno",riskYes:3,riskNo:0,category:"trasparenza",
    aiSystem:"Chatbot / Assistente Virtuale",
    obligation:"Gli utenti devono essere informati che stanno interagendo con un sistema di IA, non con una persona (Art. 50 AI Act). In vigore da agosto 2026."},
  {id:"content_gen",question:"Pubblicate contenuti generati dall'IA destinati al pubblico?",
    description:"Post social, articoli, immagini, video, audio creati con IA e pubblicati come contenuto aziendale",
    type:"yesno",riskYes:3,riskNo:0,category:"trasparenza",
    aiSystem:"Generazione contenuti IA per il pubblico",
    obligation:"I contenuti generati dall'IA devono essere etichettati in modo chiaro e visibile. I deepfake devono essere contrassegnati esplicitamente."},
  {id:"crm_recommender",question:"Il tuo software suggerisce automaticamente prodotti, offerte o azioni ai clienti?",
    description:"Es: raccomandazioni e-commerce, suggerimenti CRM, personalizzazione automatica email, dynamic pricing",
    type:"yesno",riskYes:1,riskNo:0,category:"minimo",
    aiSystem:"Sistemi di raccomandazione / Personalizzazione automatica",
    obligation:"Rischio minimo: nessun obbligo specifico, ma buona pratica tenere un registro interno."},
  {id:"hr_ai",question:"Usate software con IA per la selezione del personale o la valutazione dei dipendenti?",
    description:"Es: screening automatico CV, ranking candidati, analisi performance con scoring, decisioni su promozioni",
    type:"yesno",riskYes:6,riskNo:0,category:"alto",
    aiSystem:"Software HR con IA (selezione / valutazione personale)",
    obligation:"ALTO RISCHIO — Obblighi rigorosi: valutazione dei rischi, qualità dei dati, documentazione dettagliata, sorveglianza umana, tracciabilità. In vigore da agosto 2026."},
  {id:"credit_scoring",question:"Usate sistemi automatizzati per valutare l'affidabilità creditizia o il rischio dei clienti?",
    description:"Es: scoring automatico per concedere prestiti o rateizzazioni, valutazione rischio assicurativo, accesso a servizi essenziali",
    type:"yesno",riskYes:6,riskNo:0,category:"alto",
    aiSystem:"Scoring credito / Valutazione rischio automatica",
    obligation:"ALTO RISCHIO — Il punteggio di credito che nega la possibilità di ottenere un prestito è esplicitamente citato come caso ad alto rischio dalla Legge sull'IA."},
  {id:"biometric",question:"Usate sistemi di identificazione biometrica o riconoscimento facciale?",
    description:"Es: telecamere con riconoscimento facciale, accesso biometrico, categorizzazione persone per caratteristiche fisiche",
    type:"yesno",riskYes:6,riskNo:0,category:"alto",
    aiSystem:"Identificazione biometrica / Riconoscimento facciale",

  {id:"emotion",question:"Usate sistemi che rilevano le emozioni di dipendenti o studenti?",
    description:"Es: software che analizza espressioni facciali, tono di voce, comportamento per dedurre lo stato emotivo",

    aiSystem:"Riconoscimento emozioni sul luogo di lavoro/istruzione",
    obligation:"⛔ PRATICA VIETATA — Il riconoscimento delle emozioni nei luoghi di lavoro e negli istituti di istruzione è esplicitamente vietato dall'AI Act. Divieto già in vigore dal 2 febbraio 2025."},
  {id:"social_scoring",question:"Usate sistemi che classificano le persone in base al loro comportamento sociale?",
    description:"Es: punteggi di affidabilità basati su condotta sociale, classificazione clienti per comportamento personale, ranking reputazionale",
    type:"yesno",riskYes:8,riskNo:0,category:"vietato",
    aiSystem:"Punteggio sociale (social scoring)",
    obligation:"⛔ PRATICA VIETATA — Il punteggio sociale è esplicitamente vietato dall'AI Act. Divieto già in vigore dal 2 febbraio 2025."},
  {id:"policy",question:"Hai una policy interna scritta che regola l'uso dell'IA in azienda?",
    type:"yesno",riskYes:-3,riskNo:3,isCompliance:true},
  {id:"training",question:"Il personale che usa sistemi di IA ha ricevuto formazione sull'alfabetizzazione IA?",
    description:"L'Art. 4 della Legge sull'IA impone che fornitori e deployer garantiscano un livello sufficiente di alfabetizzazione IA al personale. Obbligo già in vigore dal 2 febbraio 2025.",
    type:"yesno",riskYes:-4,riskNo:5,isCompliance:true},
  {id:"transparency_check",question:"Informate gli utenti quando interagiscono con un sistema di IA o vedono contenuti generati dall'IA?",
    description:"Es: 'Questo messaggio è generato da un assistente IA' — obbligo di trasparenza Art. 50 AI Act",
    type:"yesno",riskYes:-2,riskNo:3,isCompliance:true},
];

const RISK_META = {
  vietato:{label:"Pratica Vietata",color:"#7F1D1D",icon:"⛔",bg:"#7F1D1D18",border:"#DC262640"},
  alto:{label:"Alto Rischio",color:"#DC2626",icon:"🔴",bg:"#DC262610",border:"#DC262630"},
  trasparenza:{label:"Rischio Trasparenza",color:"#F59E0B",icon:"🟡",bg:"#F59E0B10",border:"#F59E0B30"},
  gpai:{label:"IA per finalità generali",color:"#3B82F6",icon:"🔵",bg:"#3B82F610",border:"#3B82F630"},
  minimo:{label:"Rischio Minimo",color:"#10B981",icon:"🟢",bg:"#10B98110",border:"#10B98130"},
};

function Shell({children}){
  return React.createElement("div",{style:{minHeight:"100vh",background:"linear-gradient(165deg,#060910 0%,#0C1221 50%,#0A0F1E 100%)"}},children);
}

function NavBar({right}){
  return React.createElement("nav",{style:{padding:"18px 32px",display:"flex",justifyContent:"space-between",alignItems:"center",maxWidth:1100,margin:"0 auto"}},
    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:9}},

      React.createElement("span",{style:{color:"#fff",fontWeight:600,fontSize:18,letterSpacing:"-0.02em"}},
        "AIComply",React.createElement("span",{style:{color:"#3B82F6"}},".it"))
    ),
    right
  );
}

      <div style={{maxWidth:1100,margin:"0 auto",padding:"60px 32px 40px"}}>

function Quiz({onComplete}){
  const [cur,setCur] = useState(0);
  const [ans,setAns] = useState({});
  const q = QUESTIONS[cur];

  const pick = (v) => {
    const next = {...ans,[q.id]:v};
    setAns(next);
    if(cur < QUESTIONS.length-1) setTimeout(()=>setCur(cur+1),280);
    else setTimeout(()=>onComplete(next),350);
  };

  return (
    <Shell>
      <NavBar right={<span className="mono" style={{color:"#475569",fontSize:13}}>{cur+1}/{QUESTIONS.length}</span>} />
      <div style={{maxWidth:740,margin:"0 auto",padding:"0 32px"}}>
        <div style={{height:3,background:"rgba(255,255,255,0.04)",borderRadius:10,marginBottom:50}}>
          <div style={{height:"100%",width:(cur/QUESTIONS.length*100)+"%",background:"linear-gradient(90deg,#3B82F6,#7C3AED)",borderRadius:10,transition:"width 0.4s ease"}} />
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"60vh",padding:"0 32px"}}>
        <div style={{maxWidth:600,width:"100%"}}>
          <h2 style={{color:"#fff",fontSize:"clamp(20px,2.8vw,28px)",fontWeight:600,lineHeight:1.3,marginBottom:10,letterSpacing:"-0.015em"}}>{q.question}</h2>
          {q.description && <p style={{color:"#64748B",fontSize:14,marginBottom:32,lineHeight:1.6}}>{q.description}</p>}
          {!q.description && <div style={{height:20}}/>}

          {q.type==="select" && (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
              {q.options.map(o=>(
                <button key={o.value} className="opt" onClick={()=>pick(o.value)}
                  style={{background:ans[q.id]===o.value?"rgba(59,130,246,0.1)":"rgba(255,255,255,0.015)",
                    borderColor:ans[q.id]===o.value?"rgba(59,130,246,0.4)":undefined,
                    color:"#D1D9E6",padding:"14px 18px",borderRadius:10,fontSize:14,textAlign:"left"}}>
                  {o.label}
                </button>
              ))}
            </div>
          )}

          {q.type==="yesno" && (
            <div style={{display:"flex",gap:14}}>
              {[
                {label:"Sì",val:"yes"},
                {label:"No",val:"no"},
                ...(!q.isCompliance?[{label:"Non so",val:"unsure"}]:[]),
              ].map(o=>(
                <button key={o.val} className="opt" onClick={()=>pick(o.val)}
                  style={{flex:1,background:ans[q.id]===o.val?"rgba(59,130,246,0.1)":"rgba(255,255,255,0.015)",
                    borderColor:ans[q.id]===o.val?"rgba(59,130,246,0.4)":undefined,
                    color:"#D1D9E6",padding:"16px 20px",borderRadius:10,fontSize:16,fontWeight:500}}>
                  {o.label}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </Shell>
  );
}

function Report({answers,onRestart}){
  const [show,setShow] = useState(false);
  useEffect(()=>{setTimeout(()=>setShow(true),500)},[]);

  let risk=0;
  const systems=[];
  const obligations=[];

  QUESTIONS.forEach(q=>{
    const a=answers[q.id];
    if(q.type==="select"){const o=q.options.find(x=>x.value===a);if(o)risk+=o.risk}
    else if(q.type==="yesno"){
      if(a==="yes")risk+=q.riskYes;
      else if(a==="no")risk+=q.riskNo;
      else if(a==="unsure")risk+=Math.max((q.riskYes||0)-1,0);
      if(q.aiSystem&&(a==="yes"||a==="unsure")){
        const m=RISK_META[q.category]||{};
        systems.push({name:q.aiSystem,category:q.category,status:a==="yes"?"confermato":"da verificare",meta:m,obligation:q.obligation});
      }
    }
  });

  if(answers.policy==="no")obligations.push({text:"Nessuna policy interna sull'uso dell'IA in azienda",urgency:"alta",deadline:"Subito"});
  if(answers.training==="no")obligations.push({text:"Formazione alfabetizzazione IA non effettuata — obbligo Art. 4 AI Act",urgency:"critica",deadline:"Già in vigore"});
  if(answers.transparency_check==="no"&&systems.some(s=>s.category==="trasparenza"))
    obligations.push({text:"Mancata informativa trasparenza verso utenti che interagiscono con IA — Art. 50",urgency:"critica",deadline:"Agosto 2026"});
  if(systems.some(s=>s.category==="vietato"))
    obligations.push({text:"ATTENZIONE: possibile uso di pratica vietata dall'AI Act — rischio sanzione massima",urgency:"critica",deadline:"Già in vigore"});

  const maxR=50;
  const pct=Math.min(Math.max(Math.round((risk/maxR)*100),5),98);
  const score=100-pct;
  let lvl,lc;
  if(score>=70){lvl="BASSO";lc="#10B981"}
  else if(score>=40){lvl="MEDIO";lc="#F59E0B"}
  else{lvl="CRITICO";lc="#EF4444"}

  return (
    <Shell>
      <NavBar right={null}/>
      <div style={{maxWidth:680,margin:"0 auto",padding:"20px 24px 60px"}}>
        <div className="fade" style={{textAlign:"center",marginBottom:40}}>
          <div style={{display:"inline-block",background:lc+"12",border:"1px solid "+lc+"30",borderRadius:100,padding:"5px 16px",marginBottom:16}}>
            <span style={{color:lc,fontSize:12,fontWeight:600}}>LIVELLO DI RISCHIO: {lvl}</span>
          </div>
          <h1 style={{color:"#fff",fontSize:"clamp(24px,3.5vw,36px)",fontWeight:700,letterSpacing:"-0.02em"}}>Risultato del check</h1>
        </div>

        <div className="fade d1" style={{background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:18,padding:36,marginBottom:20,textAlign:"center"}}>
          <div style={{position:"relative",width:160,height:160,margin:"0 auto 20px"}}>
            <svg viewBox="0 0 160 160" style={{transform:"rotate(-90deg)"}}>
              <circle cx="80" cy="80" r="68" fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="10"/>
              <circle cx="80" cy="80" r="68" fill="none" stroke={lc} strokeWidth="10" strokeLinecap="round"
                strokeDasharray={(show?(score/100)*427:0)+" 427"} style={{transition:"stroke-dasharray 1s ease"}}/>
            </svg>
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}>
              <div className="mono" style={{color:lc,fontSize:40,fontWeight:700,lineHeight:1}}>{show?score:0}</div>
              <div style={{color:"#475569",fontSize:11,marginTop:3}}>su 100</div>
            </div>
          </div>
          <p style={{color:"#8896AB",fontSize:14}}>
            Sistemi IA rilevati: <strong style={{color:"#fff"}}>{systems.length}</strong> · Azioni urgenti: <strong style={{color:obligations.length>0?"#F87171":"#10B981"}}>{obligations.length}</strong>
          </p>
        </div>

        {systems.length>0 && (
          <div className="fade d2" style={{background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:18,padding:28,marginBottom:20}}>
            <h3 style={{color:"#fff",fontSize:16,fontWeight:600,marginBottom:16}}>🗂️ Sistemi IA rilevati nella tua azienda</h3>
            {systems.map((s,i)=>(
              <div key={i} style={{padding:"14px 0",borderBottom:i<systems.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                  <span style={{fontSize:16}}>{s.meta.icon||"⚪"}</span>
                  <span style={{color:"#E2E8F0",fontSize:14,fontWeight:500}}>{s.name}</span>
                  {s.status==="da verificare"&&<span style={{color:"#F59E0B",fontSize:11,background:"rgba(245,158,11,0.1)",padding:"2px 8px",borderRadius:4}}>da verificare</span>}
                </div>
                <div style={{marginLeft:26}}>
                  <span style={{color:s.meta.color,fontSize:12,fontWeight:600,background:s.meta.bg,border:"1px solid "+s.meta.border,padding:"2px 8px",borderRadius:4}}>{s.meta.label}</span>
                  {s.obligation&&<p style={{color:"#64748B",fontSize:12,marginTop:6,lineHeight:1.5}}>{s.obligation}</p>}
                </div>
              </div>
            ))}
          </div>
        )}

        {obligations.length>0 && (
          <div className="fade d3" style={{background:"rgba(239,68,68,0.03)",border:"1px solid rgba(239,68,68,0.12)",borderRadius:18,padding:28,marginBottom:20}}>
            <h3 style={{color:"#FCA5A5",fontSize:16,fontWeight:600,marginBottom:16}}>🚨 Azioni da intraprendere</h3>
            {obligations.map((o,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 0",borderBottom:i<obligations.length-1?"1px solid rgba(239,68,68,0.06)":"none"}}>
                <span style={{background:o.urgency==="critica"?"rgba(239,68,68,0.15)":"rgba(245,158,11,0.15)",color:o.urgency==="critica"?"#FCA5A5":"#FCD34D",
                  fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:4,textTransform:"uppercase",flexShrink:0,marginTop:2}}>{o.urgency}</span>
                <div>
                  <span style={{color:"#E2E8F0",fontSize:13,lineHeight:1.5}}>{o.text}</span>
                  <div className="mono" style={{color:"#64748B",fontSize:11,marginTop:3}}>Scadenza: {o.deadline}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        <div className="fade d4" style={{background:"linear-gradient(135deg,rgba(59,130,246,0.06),rgba(124,58,237,0.06))",border:"1px solid rgba(59,130,246,0.18)",borderRadius:18,padding:32,textAlign:"center",marginBottom:20}}>
          <h3 style={{color:"#fff",fontSize:20,fontWeight:700,marginBottom:10}}>Mettiti a norma con AIComply Pro</h3>
          <p style={{color:"#8896AB",fontSize:14,lineHeight:1.7,marginBottom:20,maxWidth:460,margin:"0 auto 20px"}}>
            Registro IA con storico, alert quando cambia la legge, formazione tracciata con attestati, documenti auto-generati. Tutto a €29/mese.
          </p>
          <button onClick={function(){window.open("https://buy.stripe.com/test","_blank")}}
            style={{background:"linear-gradient(135deg,#3B82F6,#2563EB)",color:"#fff",border:"none",padding:"14px 36px",borderRadius:10,fontSize:16,fontWeight:600,cursor:"pointer",marginBottom:8}}>
            Attiva AIComply Pro — €29/mese
          </button>
          <p style={{color:"#3D4B5E",fontSize:11}}>Cancelli quando vuoi. Nessun vincolo.</p>
        </div>

        <div style={{textAlign:"center",padding:"16px 0"}}>
          <p style={{color:"#3D4B5E",fontSize:11,maxWidth:480,margin:"0 auto 12px",lineHeight:1.5}}>
            Fonte normativa: Regolamento (UE) 2024/1689 — Legge sull'IA. AIComply.it non fornisce consulenza legale.
          </p>
          <button onClick={onRestart} style={{background:"transparent",border:"none",color:"#475569",fontSize:13,cursor:"pointer",textDecoration:"underline"}}>← Rifai il check</button>
        </div>
      </div>
    </Shell>
  );
}

function App(){
  const [view,setView] = useState("landing");
  const [ans,setAns] = useState({});
  if(view==="landing") return React.createElement(Landing,{onStart:function(){setView("quiz")}});
  if(view==="quiz") return React.createElement(Quiz,{onComplete:function(a){setAns(a);setView("report")}});
  return React.createElement(Report,{answers:ans,onRestart:function(){setAns({});setView("landing")}});
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>

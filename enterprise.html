const Alr=()=>(<div className="fi"><h1 style={{color:"#fff",fontSize:24,fontWeight:800,marginBottom:20}}>Alert</h1>{al.map(a=><div key={a.id} className="card" style={{marginBottom:10,padding:18}}><div style={{display:"flex",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}><h3 style={{color:"#fff",fontSize:15,fontWeight:700}}>{a.title}</h3><span className="badge" style={{background:a.severity==="critical"?"var(--rgl)":"var(--bgl)",color:a.severity==="critical"?"#FCA5A5":"#93C5FD"}}>{a.severity}</span></div><p style={{color:"#8AA8CC",fontSize:13,marginTop:6}}>{a.content}</p>{a.impact&&<p style={{color:"var(--yellow)",fontSize:12,background:"var(--ygl)",padding:"8px 12px",borderRadius:8,marginTop:8}}>\uD83D\uDCA1 {a.impact}</p>}</div>)}<div className="disc">{DISC}</div></div>);

return(<div style={{display:"flex",height:"100vh"}}><SB/><div className="mc" style={{flex:1,overflow:"auto",padding:"24px 28px"}}>{pg==="dash"&&<Ov/>}{pg==="cl"&&!sel&&<Clients/>}{pg==="ws"&&sel&&<WS/>}{pg==="act"&&<Act/>}{pg==="brand"&&<Brand/>}{pg==="al"&&<Alr/>}</div><MN/><Toast m={tm} e={te}/></div>)}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>

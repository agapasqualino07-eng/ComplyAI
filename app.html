<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIComply Pro — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{font-family:'DM Sans',sans-serif;background:#080C16;color:#CBD5E1;height:100%;overflow:hidden}
.mono{font-family:'Space Mono',monospace}
input,textarea,select{font-family:'DM Sans',sans-serif;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#E2E8F0;border-radius:8px;padding:10px 14px;font-size:14px;width:100%;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:rgba(59,130,246,.5)}
select option{background:#1E293B;color:#E2E8F0}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}
.bp{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;transition:transform .15s}
.bp:hover{transform:translateY(-1px)}
.bs{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;transition:all .2s}
.bs:hover{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.04)}
.card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:20px;transition:border .2s}
.card:hover{border-color:rgba(255,255,255,.1)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;cursor:pointer;transition:all .15s;color:#64748B;font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:left}
.sidebar-item:hover{background:rgba(255,255,255,.04);color:#94A3B8}
.sidebar-item.active{background:rgba(59,130,246,.08);color:#60A5FA}
.table-row{display:grid;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.03);align-items:center;font-size:13px;transition:background .15s}
.table-row:hover{background:rgba(255,255,255,.02)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:#0F172A;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:28px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;

/* ═══════════════════════════════════════
   SUPABASE CONFIG — INSERISCI I TUOI VALORI
   ═══════════════════════════════════════ */
const SUPABASE_URL="https://esspmwkdxhlyqhgxrmb.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzc3Btd2tkeHhobHlxaGd4cm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTIyMTgsImV4cCI6MjA5MDIyODIxOH0.fhRnrv9tAYIIIpAWQHqT-OCSeKEGPg11zZqyPjFDad4
";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

/* ═══════ RISK CATEGORIES ═══════ */
const CATS={
  vietato:{l:"Vietato",c:"#DC2626",bg:"rgba(220,38,38,.08)"},
  alto:{l:"Alto Rischio",c:"#EF4444",bg:"rgba(239,68,68,.06)"},
  trasparenza:{l:"Trasparenza",c:"#F59E0B",bg:"rgba(245,158,11,.06)"},
  gpai:{l:"IA Generativa",c:"#3B82F6",bg:"rgba(59,130,246,.06)"},
  minimo:{l:"Minimo",c:"#10B981",bg:"rgba(16,185,129,.06)"},
};

/* ═══════ AUTH SCREEN ═══════ */
function Auth({onAuth}){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[name,setName]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);

  const handle=async(e)=>{
    e.preventDefault();setErr("");setLoading(true);
    try{
      if(mode==="login"){
        const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
        if(error)throw error;
        onAuth(data.user);
      }else{
        const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{company_name:name}}});
        if(error)throw error;
        if(data.user){
          await sb.from("companies").insert({user_id:data.user.id,name:name,sector:"altro",employees:"1",compliance_score:50});
          onAuth(data.user);
        }
      }
    }catch(e){setErr(e.message)}
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(170deg,#060910,#0C1221 50%,#0A0F1E)",padding:20}}>
      <div style={{maxWidth:380,width:"100%"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:40,justifyContent:"center"}}>
          <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#3B82F6,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"#fff",fontSize:13,fontFamily:"Space Mono"}}>AI</div>
          <span style={{color:"#fff",fontWeight:600,fontSize:18}}>AIComply<span style={{color:"#3B82F6"}}>.it</span> <span style={{color:"#475569",fontSize:13,fontWeight:400}}>Pro</span></span>
        </div>

        <div className="card" style={{padding:28}}>
          <h2 style={{color:"#fff",fontSize:20,fontWeight:700,marginBottom:4}}>{mode==="login"?"Accedi":"Crea account"}</h2>
          <p style={{color:"#64748B",fontSize:13,marginBottom:20}}>{mode==="login"?"Entra nella tua dashboard":"Registrati per iniziare"}</p>

          <form onSubmit={handle} style={{display:"flex",flexDirection:"column",gap:12}}>
            {mode==="register"&&<input placeholder="Nome azienda" value={name} onChange={e=>setName(e.target.value)} required/>}
            <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required/>
            <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} required minLength={6}/>
            {err&&<p style={{color:"#EF4444",fontSize:12}}>{err}</p>}
            <button className="bp" type="submit" disabled={loading} style={{width:"100%",marginTop:4}}>
              {loading?"...":(mode==="login"?"Accedi":"Registrati")}
            </button>
          </form>

          <p style={{color:"#475569",fontSize:12,marginTop:16,textAlign:"center"}}>
            {mode==="login"?<>Non hai un account? <button onClick={()=>{setMode("register");setErr("")}} style={{background:"none",border:"none",color:"#60A5FA",cursor:"pointer",fontSize:12}}>Registrati</button></>:
            <>Hai già un account? <button onClick={()=>{setMode("login");setErr("")}} style={{background:"none",border:"none",color:"#60A5FA",cursor:"pointer",fontSize:12}}>Accedi</button></>}
          </p>
        </div>
      </div>
    </div>
  );
}

/* ═══════ SIDEBAR ═══════ */
function Sidebar({page,setPage,onLogout,companyName}){
  const items=[
    {id:"dash",icon:"📊",label:"Dashboard"},
    {id:"registry",icon:"🗂️",label:"Registro IA"},
    {id:"docs",icon:"📄",label:"Documenti"},
    {id:"training",icon:"📚",label:"Formazione"},
    {id:"alerts",icon:"🔔",label:"Alert"},
  ];
  return(
    <div style={{width:220,borderRight:"1px solid rgba(255,255,255,.04)",display:"flex",flexDirection:"column",padding:"16px 12px",flexShrink:0,background:"rgba(0,0,0,.15)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",marginBottom:28}}>
        <div style={{width:28,height:28,borderRadius:7,background:"linear-gradient(135deg,#3B82F6,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"#fff",fontSize:11,fontFamily:"Space Mono"}}>AI</div>
        <span style={{color:"#fff",fontWeight:600,fontSize:15}}>AIComply <span style={{color:"#3B82F6",fontSize:12}}>Pro</span></span>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
        {items.map(i=><button key={i.id} className={"sidebar-item"+(page===i.id?" active":"")} onClick={()=>setPage(i.id)}>
          <span style={{fontSize:16}}>{i.icon}</span>{i.label}
        </button>)}
      </div>
      <div style={{borderTop:"1px solid rgba(255,255,255,.04)",paddingTop:12}}>
        <div style={{color:"#475569",fontSize:11,padding:"0 16px",marginBottom:8}}>{companyName}</div>
        <button className="sidebar-item" onClick={onLogout}><span style={{fontSize:14}}>🚪</span>Esci</button>
      </div>
    </div>
  );
}

/* ═══════ DASHBOARD PAGE ═══════ */
function DashPage({systems,trainings,alerts}){
  const total=systems.length;
  const hi=systems.filter(s=>s.category==="alto"||s.category==="vietato").length;
  const trained=trainings.length;
  const score=Math.max(10,Math.min(95,70-hi*15+trained*5+(total>0?10:0)));
  const lc=score>=70?"#10B981":score>=40?"#F59E0B":"#EF4444";

  return(
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:16}}>
      <h1 style={{color:"#fff",fontSize:22,fontWeight:700}}>Dashboard</h1>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12}}>
        <div className="card" style={{textAlign:"center",padding:24}}>
          <div className="mono" style={{color:lc,fontSize:36,fontWeight:700}}>{score}</div>
          <div style={{color:"#64748B",fontSize:12,marginTop:4}}>Punteggio compliance</div>
        </div>
        <div className="card" style={{textAlign:"center",padding:24}}>
          <div className="mono" style={{color:"#fff",fontSize:36,fontWeight:700}}>{total}</div>
          <div style={{color:"#64748B",fontSize:12,marginTop:4}}>Sistemi IA registrati</div>
        </div>
        <div className="card" style={{textAlign:"center",padding:24}}>
          <div className="mono" style={{color:hi>0?"#EF4444":"#10B981",fontSize:36,fontWeight:700}}>{hi}</div>
          <div style={{color:"#64748B",fontSize:12,marginTop:4}}>Alto rischio / Vietati</div>
        </div>
        <div className="card" style={{textAlign:"center",padding:24}}>
          <div className="mono" style={{color:"#fff",fontSize:36,fontWeight:700}}>{trained}</div>
          <div style={{color:"#64748B",fontSize:12,marginTop:4}}>Formazioni registrate</div>
        </div>
      </div>

      {hi>0&&<div style={{background:"rgba(239,68,68,.04)",border:"1px solid rgba(239,68,68,.12)",borderRadius:10,padding:16}}>
        <p style={{color:"#FCA5A5",fontSize:14,fontWeight:600}}>⚠️ Hai {hi} sistema/i ad alto rischio o vietato/i</p>
        <p style={{color:"#64748B",fontSize:13,marginTop:4}}>Verifica immediatamente i sistemi classificati come "vietato" e adotta le misure richieste per quelli ad "alto rischio".</p>
      </div>}

      {alerts.length>0&&<div>
        <h3 style={{color:"#fff",fontSize:15,fontWeight:600,marginBottom:10}}>🔔 Ultimi alert normativi</h3>
        {alerts.slice(0,3).map(a=><div key={a.id} className="card" style={{marginBottom:8,padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#E2E8F0",fontSize:13,fontWeight:500}}>{a.title}</span>
            <span className="badge" style={{background:a.severity==="critical"?"rgba(239,68,68,.12)":a.severity==="warning"?"rgba(245,158,11,.12)":"rgba(59,130,246,.1)",
              color:a.severity==="critical"?"#FCA5A5":a.severity==="warning"?"#FCD34D":"#93C5FD"}}>{a.severity}</span>
          </div>
          <p style={{color:"#64748B",fontSize:12,marginTop:4}}>{a.content?.substring(0,120)}...</p>
          <span className="mono" style={{color:"#334155",fontSize:10}}>{new Date(a.published_at).toLocaleDateString("it-IT")}</span>
        </div>)}
      </div>}
    </div>
  );
}

/* ═══════ REGISTRY PAGE ═══════ */
function RegistryPage({systems,companyId,refresh}){
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({name:"",provider:"",category:"gpai",status:"attivo",obligation:"",notes:""});
  const[editing,setEditing]=useState(null);

  const save=async()=>{
    if(!form.name)return;
    if(editing){
      await sb.from("ai_systems").update({...form,updated_at:new Date().toISOString()}).eq("id",editing);
    }else{
      await sb.from("ai_systems").insert({...form,company_id:companyId});
    }
    setShowForm(false);setEditing(null);setForm({name:"",provider:"",category:"gpai",status:"attivo",obligation:"",notes:""});
    refresh();
  };
  const edit=(s)=>{setForm({name:s.name,provider:s.provider||"",category:s.category,status:s.status,obligation:s.obligation||"",notes:s.notes||""});setEditing(s.id);setShowForm(true)};
  const del=async(id)=>{if(confirm("Eliminare questo sistema?")){await sb.from("ai_systems").delete().eq("id",id);refresh()}};

  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h1 style={{color:"#fff",fontSize:22,fontWeight:700}}>Registro IA</h1>
        <button className="bp" onClick={()=>{setEditing(null);setForm({name:"",provider:"",category:"gpai",status:"attivo",obligation:"",notes:""});setShowForm(true)}}>+ Aggiungi sistema</button>
      </div>

      {systems.length===0?<div className="card" style={{textAlign:"center",padding:40}}><p style={{color:"#64748B",fontSize:14}}>Nessun sistema IA registrato. Aggiungi il primo.</p></div>:
      <div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 80px",padding:"8px 16px",color:"#475569",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>
          <span>Sistema</span><span>Categoria</span><span>Stato</span><span>Data</span><span></span>
        </div>
        {systems.map(s=>{const cat=CATS[s.category]||{l:s.category,c:"#64748B",bg:"rgba(100,116,139,.1)"};return(
          <div key={s.id} className="table-row" style={{gridTemplateColumns:"2fr 1fr 1fr 1fr 80px"}}>
            <div><span style={{color:"#E2E8F0",fontWeight:500}}>{s.name}</span>{s.provider&&<span style={{color:"#475569",fontSize:11,marginLeft:8}}>{s.provider}</span>}</div>
            <span className="badge" style={{background:cat.bg,color:cat.c}}>{cat.l}</span>
            <span style={{color:s.status==="attivo"?"#10B981":"#64748B",fontSize:12}}>{s.status}</span>
            <span className="mono" style={{color:"#475569",fontSize:11}}>{new Date(s.created_at).toLocaleDateString("it-IT")}</span>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>edit(s)} style={{background:"none",border:"none",color:"#60A5FA",fontSize:12,cursor:"pointer"}}>✏️</button>
              <button onClick={()=>del(s.id)} style={{background:"none",border:"none",color:"#EF4444",fontSize:12,cursor:"pointer"}}>🗑️</button>
            </div>
          </div>
        )})}
      </div>}

      {showForm&&<div className="modal-overlay" onClick={()=>setShowForm(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <h3 style={{color:"#fff",fontSize:17,fontWeight:700,marginBottom:16}}>{editing?"Modifica sistema":"Nuovo sistema IA"}</h3>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Nome del sistema *</label>
          <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Es: ChatGPT per customer service"/></div>
          <div><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Fornitore</label>
          <input value={form.provider} onChange={e=>setForm({...form,provider:e.target.value})} placeholder="Es: OpenAI"/></div>
          <div><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Categoria di rischio</label>
          <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
            <option value="vietato">⛔ Pratica Vietata</option>
            <option value="alto">🔴 Alto Rischio</option>
            <option value="trasparenza">🟡 Rischio Trasparenza</option>
            <option value="gpai">🔵 IA Generativa</option>
            <option value="minimo">🟢 Rischio Minimo</option>
          </select></div>
          <div><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Stato</label>
          <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
            <option value="attivo">Attivo</option>
            <option value="in valutazione">In valutazione</option>
            <option value="dismesso">Dismesso</option>
          </select></div>
          <div><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Obbligo normativo</label>
          <textarea value={form.obligation} onChange={e=>setForm({...form,obligation:e.target.value})} rows={2} placeholder="Es: Obbligo di trasparenza Art. 50"/></div>
          <div><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Note</label>
          <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2}/></div>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button className="bp" onClick={save}>{editing?"Salva modifiche":"Aggiungi"}</button>
            <button className="bs" onClick={()=>setShowForm(false)}>Annulla</button>
          </div>
        </div>
      </div></div>}
    </div>
  );
}

/* ═══════ DOCS PAGE ═══════ */
function DocsPage({company,systems}){
  const[viewing,setViewing]=useState(null);

  const docs=[
    {id:"policy",title:"Policy Interna sull'uso dell'IA",desc:"Documento che regola l'utilizzo di sistemi IA in azienda. Conforme all'AI Act e L.132/2025.",icon:"📋"},
    {id:"info_dip",title:"Informativa IA per i dipendenti",desc:"Informativa scritta sull'uso di IA nei processi aziendali. Art. 11 L.132/2025.",icon:"👥"},
    {id:"info_cli",title:"Informativa trasparenza per clienti",desc:"Avviso sull'utilizzo di sistemi IA. Art. 50 AI Act.",icon:"🤝"},
    {id:"registro",title:"Registro IA formale (stampabile)",desc:"Versione formale del registro con data e firma per ispezioni.",icon:"🗂️"},
  ];

  const genDoc=(type)=>{
    const n=company?.name||"[Nome Azienda]";
    const sect=company?.sector||"[Settore]";
    const syslist=systems.filter(s=>s.status==="attivo").map(s=>`• ${s.name} (${CATS[s.category]?.l||s.category}) — ${s.obligation||"Nessun obbligo specifico"}`).join("\n");
    const date=new Date().toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"});

    if(type==="policy")return`POLICY INTERNA SULL'USO DELL'INTELLIGENZA ARTIFICIALE\n${n}\nData: ${date}\n\n1. PREMESSA\nLa presente policy disciplina l'utilizzo dei sistemi di intelligenza artificiale in ${n}, in conformità al Regolamento (UE) 2024/1689 (AI Act) e alla Legge 23 settembre 2025, n. 132.\n\n2. AMBITO DI APPLICAZIONE\nLa presente policy si applica a tutti i dipendenti, collaboratori e soggetti che operano per conto di ${n} e che utilizzano, direttamente o indirettamente, sistemi di intelligenza artificiale nello svolgimento delle proprie attività.\n\n3. SISTEMI IA AUTORIZZATI\nI seguenti sistemi IA sono autorizzati per l'uso aziendale:\n${syslist||"Nessun sistema registrato."}\n\n4. PRINCIPI DI UTILIZZO\n- L'IA è utilizzata esclusivamente come strumento di supporto\n- Il lavoro intellettuale umano deve prevalere in ogni decisione\n- L'utilizzo deve rispettare la dignità, la sicurezza e i diritti fondamentali\n- È vietato l'uso di sistemi IA per pratiche proibite dall'Art. 5 dell'AI Act\n\n5. OBBLIGHI DEI DIPENDENTI\n- Utilizzare solo i sistemi IA autorizzati dalla presente policy\n- Non inserire dati personali, riservati o sensibili in sistemi IA esterni senza autorizzazione\n- Segnalare eventuali anomalie o risultati discriminatori\n- Partecipare ai programmi di formazione sull'alfabetizzazione IA\n\n6. TRASPARENZA\n- I contenuti generati dall'IA devono essere revisionati prima della pubblicazione\n- I clienti/utenti devono essere informati quando interagiscono con un sistema IA\n- I deepfake o contenuti sintetici devono essere etichettati\n\n7. FORMAZIONE\nIn conformità all'Art. 4 del Reg. (UE) 2024/1689, ${n} garantisce un livello sufficiente di alfabetizzazione IA a tutto il personale che utilizza sistemi di IA.\n\n8. AGGIORNAMENTO\nLa presente policy viene revisionata con cadenza almeno semestrale e aggiornata in occasione di modifiche normative rilevanti.\n\nFirma del legale rappresentante\n______________________________\nData: ${date}`;

    if(type==="info_dip")return`INFORMATIVA SULL'UTILIZZO DI SISTEMI DI INTELLIGENZA ARTIFICIALE\n(ai sensi dell'Art. 11, Legge 23 settembre 2025, n. 132)\n\n${n}\nData: ${date}\n\nGentile dipendente/collaboratore,\n\ncon la presente La informiamo che ${n} utilizza i seguenti sistemi di intelligenza artificiale nei propri processi aziendali:\n\n${syslist||"Nessun sistema registrato."}\n\nFINALITÀ\nI sistemi sopra elencati sono utilizzati esclusivamente come strumenti di supporto alle attività aziendali, al fine di migliorare l'efficienza operativa. In nessun caso sostituiscono il giudizio umano nelle decisioni che riguardano i lavoratori.\n\nLOGICHE DI FUNZIONAMENTO\nI sistemi di IA utilizzati elaborano dati sulla base di modelli statistici e algoritmi di apprendimento automatico. I risultati prodotti sono sempre soggetti a revisione umana.\n\nLIMITI\nI sistemi di IA possono produrre risultati inesatti, incompleti o non contestualizzati. Pertanto, ogni output viene verificato dal personale competente prima di essere utilizzato per decisioni aziendali.\n\nDIRITTI DEL LAVORATORE\n- Ha diritto a contestare decisioni basate su output di sistemi IA\n- Ha diritto a richiedere l'intervento umano\n- Ha diritto a ricevere formazione adeguata sull'uso dei sistemi IA\n- Ha diritto a segnalare anomalie o comportamenti discriminatori\n\nTRATTAMENTO DEI DATI\nI dati personali eventualmente elaborati dai sistemi IA sono trattati in conformità al Reg. (UE) 2016/679 (GDPR) e al D.Lgs. 196/2003.\n\nLa presente informativa è stata consegnata in data ${date} in conformità all'Art. 11 della Legge 132/2025.\n\nFirma del datore di lavoro: ______________________________\nFirma del lavoratore per ricevuta: ______________________________`;

    if(type==="info_cli")return`INFORMATIVA SULL'UTILIZZO DI SISTEMI DI INTELLIGENZA ARTIFICIALE\n(ai sensi dell'Art. 50, Reg. UE 2024/1689)\n\n${n}\n\nGentile cliente/utente,\n\nLa informiamo che ${n} utilizza sistemi di intelligenza artificiale nelle proprie attività. In particolare:\n\n${syslist||"Nessun sistema registrato."}\n\nTRASPARENZA\nIn conformità al Regolamento (UE) 2024/1689 (AI Act), La informiamo che:\n- Quando interagisce con un chatbot o assistente virtuale, sta comunicando con un sistema di intelligenza artificiale\n- I contenuti generati dall'IA vengono identificati come tali\n- I Suoi dati vengono trattati in conformità al GDPR\n\nDIRITTI\n- Ha diritto a richiedere l'interazione con un operatore umano\n- Ha diritto a conoscere quali sistemi IA sono utilizzati\n- Ha diritto a non essere soggetto a decisioni esclusivamente automatizzate\n\nCONTATTI\nPer informazioni sull'uso dell'IA in ${n}, contattare: [inserire contatto]\n\nData: ${date}`;

    if(type==="registro")return`REGISTRO DEI SISTEMI DI INTELLIGENZA ARTIFICIALE\n${n}\nAggiornato al: ${date}\n\n${"=".repeat(60)}\n\n${systems.length===0?"Nessun sistema registrato.":systems.map((s,i)=>`SISTEMA #${i+1}\nNome: ${s.name}\nFornitore: ${s.provider||"N/D"}\nCategoria di rischio: ${CATS[s.category]?.l||s.category}\nStato: ${s.status}\nObbligo normativo: ${s.obligation||"Nessuno"}\nData registrazione: ${new Date(s.created_at).toLocaleDateString("it-IT")}\nNote: ${s.notes||"Nessuna"}\n${"—".repeat(40)}`).join("\n\n")}\n\n${"=".repeat(60)}\n\nIl presente registro è tenuto in conformità al Reg. (UE) 2024/1689 e alla L. 132/2025.\n\nFirma del legale rappresentante: ______________________________\nData: ${date}`;

    return"";
  };

  return(
    <div className="fade-in">
      <h1 style={{color:"#fff",fontSize:22,fontWeight:700,marginBottom:16}}>Documenti di Compliance</h1>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12}}>
        {docs.map(d=><div key={d.id} className="card" style={{cursor:"pointer"}} onClick={()=>setViewing(d.id)}>
          <div style={{fontSize:28,marginBottom:10}}>{d.icon}</div>
          <h3 style={{color:"#fff",fontSize:14,fontWeight:600,marginBottom:4}}>{d.title}</h3>
          <p style={{color:"#64748B",fontSize:12,lineHeight:1.5}}>{d.desc}</p>
          <button className="bs" style={{marginTop:12,fontSize:12}}>Visualizza →</button>
        </div>)}
      </div>

      {viewing&&<div className="modal-overlay" onClick={()=>setViewing(null)}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:640,maxHeight:"85vh"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{color:"#fff",fontSize:16,fontWeight:700}}>{docs.find(d=>d.id===viewing)?.title}</h3>
          <div style={{display:"flex",gap:8}}>
            <button className="bs" onClick={()=>{const t=genDoc(viewing);const b=new Blob([t],{type:"text/plain"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=viewing+".txt";a.click();URL.revokeObjectURL(u)}}>📥 Scarica</button>
            <button className="bs" onClick={()=>setViewing(null)}>✕</button>
          </div>
        </div>
        <pre style={{color:"#B8C5D6",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"DM Sans",background:"rgba(0,0,0,.2)",padding:20,borderRadius:8,maxHeight:"60vh",overflowY:"auto"}}>{genDoc(viewing)}</pre>
      </div></div>}
    </div>
  );
}

/* ═══════ TRAINING PAGE ═══════ */
function TrainingPage({trainings,companyId,refresh}){
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({employee_name:"",topic:"AI Literacy — Alfabetizzazione IA (Art. 4)",duration_hours:1,completed_at:new Date().toISOString().split("T")[0],notes:""});

  const save=async()=>{
    if(!form.employee_name)return;
    await sb.from("training_records").insert({...form,company_id:companyId});
    setShowForm(false);setForm({employee_name:"",topic:"AI Literacy — Alfabetizzazione IA (Art. 4)",duration_hours:1,completed_at:new Date().toISOString().split("T")[0],notes:""});
    refresh();
  };

  const genCert=(t)=>{
    const txt=`\n${"═".repeat(50)}\n           ATTESTATO DI FORMAZIONE\n          ALFABETIZZAZIONE IA (AI LITERACY)\n${"═".repeat(50)}\n\nSi attesta che:\n\n   ${t.employee_name}\n\nha completato il programma di formazione su:\n\n   "${t.topic}"\n\nin data ${new Date(t.completed_at).toLocaleDateString("it-IT")}\nDurata: ${t.duration_hours} ora/e\n\nLa formazione è stata erogata in conformità all'Art. 4\ndel Regolamento (UE) 2024/1689 (AI Act).\n\n${t.notes?"Note: "+t.notes+"\n":""}\nData rilascio attestato: ${new Date().toLocaleDateString("it-IT")}\n\nFirma del responsabile: ______________________________\n\n${"═".repeat(50)}\n   Documento generato da AIComply.it\n${"═".repeat(50)}\n`;
    const b=new Blob([txt],{type:"text/plain"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`attestato-${t.employee_name.replace(/\s/g,"-")}.txt`;a.click();URL.revokeObjectURL(u);
  };

  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h1 style={{color:"#fff",fontSize:22,fontWeight:700}}>Formazione Tracciata</h1>
        <button className="bp" onClick={()=>setShowForm(true)}>+ Registra formazione</button>
      </div>

      {trainings.length===0?<div className="card" style={{textAlign:"center",padding:40}}><p style={{color:"#64748B",fontSize:14}}>Nessuna formazione registrata. L'Art. 4 AI Act richiede l'alfabetizzazione IA del personale.</p></div>:
      <div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1fr 60px",padding:"8px 16px",color:"#475569",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>
          <span>Dipendente</span><span>Argomento</span><span>Data</span><span>Ore</span><span></span>
        </div>
        {trainings.map(t=>(
          <div key={t.id} className="table-row" style={{gridTemplateColumns:"2fr 2fr 1fr 1fr 60px"}}>
            <span style={{color:"#E2E8F0",fontWeight:500}}>{t.employee_name}</span>
            <span style={{color:"#94A3B8",fontSize:12}}>{t.topic}</span>
            <span className="mono" style={{color:"#475569",fontSize:11}}>{new Date(t.completed_at).toLocaleDateString("it-IT")}</span>
            <span style={{color:"#64748B",fontSize:12}}>{t.duration_hours}h</span>
            <button onClick={()=>genCert(t)} title="Scarica attestato" style={{background:"none",border:"none",color:"#60A5FA",fontSize:14,cursor:"pointer"}}>📜</button>
          </div>
        ))}
      </div>}

      {showForm&&<div className="modal-overlay" onClick={()=>setShowForm(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <h3 style={{color:"#fff",fontSize:17,fontWeight:700,marginBottom:16}}>Registra formazione</h3>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Nome dipendente *</label>
          <input value={form.employee_name} onChange={e=>setForm({...form,employee_name:e.target.value})} placeholder="Mario Rossi"/></div>
          <div><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Argomento</label>
          <select value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})}>
            <option>AI Literacy — Alfabetizzazione IA (Art. 4)</option>
            <option>Uso responsabile di ChatGPT/IA Generativa</option>
            <option>Trasparenza IA verso clienti (Art. 50)</option>
            <option>Pratiche vietate dall'AI Act (Art. 5)</option>
            <option>Obblighi L.132/2025 — IA nel lavoro</option>
            <option>Policy aziendale sull'uso dell'IA</option>
            <option>Altro</option>
          </select></div>
          <div style={{display:"flex",gap:12}}>
            <div style={{flex:1}}><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Data</label>
            <input type="date" value={form.completed_at} onChange={e=>setForm({...form,completed_at:e.target.value})}/></div>
            <div style={{flex:1}}><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Durata (ore)</label>
            <input type="number" min="0.5" step="0.5" value={form.duration_hours} onChange={e=>setForm({...form,duration_hours:parseFloat(e.target.value)})}/></div>
          </div>
          <div><label style={{color:"#64748B",fontSize:12,marginBottom:4,display:"block"}}>Note</label>
          <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2}/></div>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button className="bp" onClick={save}>Registra</button>
            <button className="bs" onClick={()=>setShowForm(false)}>Annulla</button>
          </div>
        </div>
      </div></div>}
    </div>
  );
}

/* ═══════ ALERTS PAGE ═══════ */
function AlertsPage({alerts}){
  return(
    <div className="fade-in">
      <h1 style={{color:"#fff",fontSize:22,fontWeight:700,marginBottom:16}}>Alert Normativi</h1>
      {alerts.length===0?<div className="card" style={{textAlign:"center",padding:40}}><p style={{color:"#64748B",fontSize:14}}>Nessun alert al momento. Ti avviseremo quando ci saranno aggiornamenti normativi rilevanti.</p></div>:
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {alerts.map(a=><div key={a.id} className="card" style={{padding:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <h3 style={{color:"#fff",fontSize:15,fontWeight:600}}>{a.title}</h3>
            <span className="badge" style={{background:a.severity==="critical"?"rgba(239,68,68,.12)":a.severity==="warning"?"rgba(245,158,11,.12)":"rgba(59,130,246,.1)",
              color:a.severity==="critical"?"#FCA5A5":a.severity==="warning"?"#FCD34D":"#93C5FD",flexShrink:0}}>{a.severity==="critical"?"Critico":a.severity==="warning"?"Importante":"Info"}</span>
          </div>
          <p style={{color:"#94A3B8",fontSize:13,lineHeight:1.6,marginBottom:8}}>{a.content}</p>
          {a.impact&&<p style={{color:"#F59E0B",fontSize:12,background:"rgba(245,158,11,.06)",padding:"6px 10px",borderRadius:6,marginBottom:8}}>💡 Impatto sulla tua azienda: {a.impact}</p>}
          <div style={{display:"flex",gap:16}}>
            <span className="mono" style={{color:"#334155",fontSize:10}}>{new Date(a.published_at).toLocaleDateString("it-IT")}</span>
            {a.source&&<span style={{color:"#334155",fontSize:10}}>Fonte: {a.source}</span>}
          </div>
        </div>)}
      </div>}
    </div>
  );
}

/* ═══════ MAIN APP ═══════ */
function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[page,setPage]=useState("dash");
  const[company,setCompany]=useState(null);
  const[systems,setSystems]=useState([]);
  const[trainings,setTrainings]=useState([]);
  const[alerts,setAlerts]=useState([]);

  const loadData=useCallback(async(uid)=>{
    const{data:co}=await sb.from("companies").select("*").eq("user_id",uid).single();
    setCompany(co);
    if(co){
      const{data:sys}=await sb.from("ai_systems").select("*").eq("company_id",co.id).order("created_at",{ascending:false});
      setSystems(sys||[]);
      const{data:tr}=await sb.from("training_records").select("*").eq("company_id",co.id).order("completed_at",{ascending:false});
      setTrainings(tr||[]);
    }
    const{data:al}=await sb.from("alerts").select("*").order("published_at",{ascending:false});
    setAlerts(al||[]);
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){setUser(session.user);loadData(session.user.id)}
      setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((ev,session)=>{
      if(session?.user){setUser(session.user);loadData(session.user.id)}
      else{setUser(null);setCompany(null)}
    });
    return()=>subscription.unsubscribe();
  },[loadData]);

  const logout=async()=>{await sb.auth.signOut();setUser(null);setCompany(null)};
  const refresh=()=>user&&loadData(user.id);

  if(loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#080C16"}}><span style={{color:"#475569"}}>Caricamento...</span></div>;
  if(!user)return<Auth onAuth={(u)=>{setUser(u);loadData(u.id)}}/>;

  return(
    <div style={{display:"flex",height:"100vh"}}>
      <Sidebar page={page} setPage={setPage} onLogout={logout} companyName={company?.name||""}/>
      <div style={{flex:1,overflow:"auto",padding:"24px 32px"}}>
        {page==="dash"&&<DashPage systems={systems} trainings={trainings} alerts={alerts}/>}
        {page==="registry"&&<RegistryPage systems={systems} companyId={company?.id} refresh={refresh}/>}
        {page==="docs"&&<DocsPage company={company} systems={systems}/>}
        {page==="training"&&<TrainingPage trainings={trainings} companyId={company?.id} refresh={refresh}/>}
        {page==="alerts"&&<AlertsPage alerts={alerts}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>

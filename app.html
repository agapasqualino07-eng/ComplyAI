<style>
:root{--bg:#06080E;--card:rgba(255,255,255,.025);--border:rgba(255,255,255,.06);--bh:rgba(255,255,255,.12);--text:#C8D2E0;--muted:#5A6A80;--blue:#4F8EF7;--bgl:rgba(79,142,247,.12);--bbr:rgba(79,142,247,.2);--green:#34D399;--ggl:rgba(52,211,153,.1);--yellow:#FBBF24;--ygl:rgba(251,191,36,.08);--red:#F87171;--rgl:rgba(248,113,113,.08);--purple:#A78BFA;--pgl:rgba(167,139,250,.1);--sb:240px;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace}
input,textarea,select{font-family:inherit;background:rgba(255,255,255,.04);border:1px solid var(--border);color:#E2E8F0;border-radius:var(--r);padding:11px 14px;font-size:14px;width:100%;outline:0;transition:all .2s}
input:focus,textarea:focus,select:focus{border-color:var(--bbr);box-shadow:0 0 0 3px var(--bgl)}
input::placeholder,textarea::placeholder{color:#3D4D63}select option{background:#151C2C;color:#E2E8F0}
button{font-family:inherit;cursor:pointer;border:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:10px}
.bp{background:linear-gradient(135deg,#4F8EF7,#3B6FD9);color:#fff;padding:10px 22px;border-radius:var(--r);font-size:14px;font-weight:600;transition:all .2s;box-shadow:0 2px 12px rgba(79,142,247,.2)}
.bp:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 20px rgba(79,142,247,.3)}.bp:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.bs{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:var(--r);font-size:13px;font-weight:500;transition:all .2s}.bs:hover{border-color:var(--bh);background:rgba(255,255,255,.06)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border .25s}.card:hover{border-color:var(--bh)}
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.fi{animation:fi .4s ease}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mbg{position:fixed;inset:0;background:rgba(4,6,14,.8);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px)}
.mdl{background:linear-gradient(180deg,#111827,#0D1117);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:540px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.ptr{height:6px;background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden}.pb{height:100%;border-radius:10px;transition:width 1s ease}
.disc{color:#3D4D63;font-size:10px;line-height:1.7;padding:14px;background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.03);border-radius:var(--r);margin-top:20px}
.side{width:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 12px;flex-shrink:0;background:linear-gradient(180deg,rgba(10,14,24,.95),rgba(6,8,14,.98))}
.si{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);transition:all .2s;color:var(--muted);font-size:13px;font-weight:500;background:none;width:100%;text-align:left;border:1px solid transparent}
.si:hover{background:rgba(79,142,247,.04);color:#8AA8CC}.si.on{background:var(--bgl);color:var(--blue);border-color:var(--bbr)}
.mn{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(6,8,14,.95);border-top:1px solid var(--border);z-index:50;padding:6px 0;backdrop-filter:blur(12px)}
.mb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;background:none;color:var(--muted);font-size:10px;font-weight:500}.mb.on{color:var(--blue)}
.grid{display:grid;gap:12px}.g2{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}.g4{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;position:relative;overflow:hidden}
.sbox{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px 9px 36px;font-size:13px;color:#E2E8F0;width:100%;max-width:280px;outline:0;transition:border .2s}.sbox:focus{border-color:var(--bbr)}
.toast{position:fixed;bottom:24px;right:24px;background:#10B981;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;animation:fi .3s ease;box-shadow:0 4px 20px rgba(16,185,129,.3)}
.toast-err{background:#EF4444;box-shadow:0 4px 20px rgba(239,68,68,.3)}
@media(max-width:768px){.side{display:none}.mn{display:flex}.mc{padding-bottom:72px!important}.g2,.g4{grid-template-columns:1fr 1fr}.mdl{width:96%;padding:20px;max-height:90vh}.sbox{max-width:100%}}
@media(max-width:480px){.g2,.g4{grid-template-columns:1fr}}
@media(min-width:769px){.mn{display:none!important}}
</style>

const CATS={vietato:{l:"Pratica Vietata",c:"#DC2626",bg:"rgba(220,38,38,.08)",ic:"⛔"},alto:{l:"Alto Rischio",c:"#F87171",bg:"rgba(248,113,113,.06)",ic:"🔴"},trasparenza:{l:"Rischio Trasparenza",c:"#FBBF24",bg:"rgba(251,191,36,.06)",ic:"🟡"},gpai:{l:"IA Generativa",c:"#4F8EF7",bg:"rgba(79,142,247,.06)",ic:"🔵"},minimo:{l:"Rischio Minimo",c:"#34D399",bg:"rgba(52,211,153,.06)",ic:"🟢"}};

const MODS=[{id:"m1",title:"Cos'è l'AI Act",dur:.5,txt:"Reg. (UE) 2024/1689 — prima legge mondiale sull'IA.\n\n4 livelli: Vietato, Alto, Trasparenza, Minimo.\n\nDal 2 feb 2025:\n• 8 pratiche vietate (Art. 5)\n• Obbligo AI literacy (Art. 4)\n\nDa ago 2026:\n• Alto rischio + Trasparenza (Art. 50)"},{id:"m2",title:"Uso responsabile IA Generativa",dur:.5,txt:"✅ Supporto, brainstorming, traduzioni. Revisione output.\n\n❌ No dati personali. No segreti aziendali. No pubblicazione senza revisione.\n\n⚠️ Etichettare contenuti IA. Segnalare anomalie."},{id:"m3",title:"8 pratiche vietate (Art. 5)",dur:.5,txt:"Dal 2 feb 2025:\n1. Manipolazione subliminale\n2. Sfruttamento vulnerabilità\n3. Social scoring\n4. Previsione reato\n5. Scraping biometrico\n6. Emozioni lavoro/scuola\n7. Categorizzazione biometrica\n8. ID biometrica remota\n\nSanzione: €35M o 7% fatturato."},{id:"m4",title:"Legge italiana 132/2025",dur:.5,txt:"Dal 10 ott 2025:\n\nArt. 11 — Lavoro:\n• Informativa scritta dipendenti\n• Finalità, logiche, limiti\n• Human-in-command\n\nArt. 13 — Professioni:\n• IA solo supporto\n• Lavoro umano prevalente\n• Cliente informato"}];

function calcScore(sys,docs,tr){const hi=sys.filter(s=>s.category==="alto"||s.category==="vietato").length;const sd=docs.filter(d=>d.status==="signed").length;const td=docs.length||4;return Math.max(5,Math.min(98,30+(sys.length>0?20:0)-(hi*12)+Math.min(tr.length*5,20)+Math.round((sd/td)*30)))}
function Toast({msg,isErr}){if(!msg)return null;return<div className={"toast"+(isErr?" toast-err":"")}>{msg}</div>}

/* ══ AUTH ══ */
function Auth({onAuth}){
const[mode,setMode]=useState("login");const[email,setEmail]=useState("");const[pass,setPass]=useState("");const[name,setName]=useState("");
const[err,setErr]=useState("");const[ld,setLd]=useState(false);const[resetOk,setResetOk]=useState(false);
const go=async(e)=>{e.preventDefault();if(ld)return;setErr("");setLd(true);
try{
if(mode==="reset"){const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+"/app"});if(error)throw error;setResetOk(true);setLd(false);return}
if(mode==="login"){const{data,error}=await sb.auth.signInWithPassword({email,password:pass});if(error)throw error;onAuth(data.user)}
else{const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{company_name:name}}});if(error)throw error;
if(data.user){
let td=null,sc=50,imp=[],tools=[];try{const r=localStorage.getItem("aicomply_data");if(r){td=JSON.parse(r);sc=td.score||50;imp=td.systems||[];tools=td.selectedTools||[]}}catch(x){}
const{data:co}=await sb.from("companies").insert({user_id:data.user.id,name:name,sector:td?.answers?.sector||"altro",employees:td?.answers?.emp||"1",compliance_score:sc,questionnaire_data:td?.answers||null}).select().single();
if(co){
const rows=[];const tm={chatgpt:"chatgpt",gemini:"gemini",copilot:"copilot",claude:"claude",midjourney:"midjourney"};
const tn={chatbot_web:"Chatbot sito",crm_ia:"CRM con IA",hr_ia:"Software HR IA",accounting_ia:"Contabilità IA",altro_ia:"Altro IA"};
const tc={chatbot_web:"trasparenza",crm_ia:"minimo",hr_ia:"alto",accounting_ia:"minimo",altro_ia:"minimo"};
imp.forEach(s=>rows.push({company_id:co.id,name:s.name,category:s.category,status:s.status==="confermato"?"attivo":"in valutazione",obligation:s.obligation||""}));
tools.forEach(t=>{const vk=tm[t];const v=vk?VENDORS[vk]:null;if(v&&!rows.some(r=>r.name===v.name))rows.push({company_id:co.id,name:v.name,provider:v.provider,category:v.cat,status:"attivo",obligation:v.risks?v.risks[0]:"",vendor_key:vk});
else if(!vk){const nm=tn[t]||t;if(!rows.some(r=>r.name===nm))rows.push({company_id:co.id,name:nm,provider:"",category:tc[t]||"minimo",status:"attivo",vendor_key:""})}});
if(rows.length>0)await sb.from("ai_systems").insert(rows);
await sb.from("documents").insert(RDOCS.map(d=>({company_id:co.id,doc_type:d.type,doc_title:d.title,status:"missing"})))}
try{localStorage.removeItem("aicomply_data")}catch(x){}
onAuth(data.user)}}
}catch(e){setErr(e.message)}setLd(false)};
return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(170deg,#04060C,#0A0F1C 50%,#060A14)",padding:20}}>
<div style={{maxWidth:400,width:"100%"}}>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:36,justifyContent:"center"}}><div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#4F8EF7,#3B6FD9)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"#fff",fontSize:14,fontFamily:"'JetBrains Mono'",boxShadow:"0 4px 20px rgba(79,142,247,.25)"}}>AI</div>
<span style={{color:"#fff",fontWeight:700,fontSize:20}}>AIComply<span style={{color:"var(--blue)"}}>.it</span> <span style={{color:"var(--muted)",fontSize:13,fontWeight:500}}>Pro</span></span></div>
<div style={{background:"linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01))",border:"1px solid var(--border)",borderRadius:16,padding:32}}>
<h2 style={{color:"#fff",fontSize:22,fontWeight:700,marginBottom:4}}>{mode==="login"?"Bentornato":mode==="register"?"Crea account":"Recupera password"}</h2>
<p style={{color:"var(--muted)",fontSize:13,marginBottom:22}}>{mode==="reset"?(resetOk?"Email inviata! Controlla la casella.":"Inserisci la tua email"):mode==="login"?"Entra nella dashboard":"Registrati per iniziare"}</p>
{!resetOk&&<form onSubmit={go} style={{display:"flex",flexDirection:"column",gap:14}}>
{mode==="register"&&<input placeholder="Nome azienda" value={name} onChange={e=>setName(e.target.value)} required/>}

{mode!=="reset"&&<input type="password" placeholder="Password (min. 6)" value={pass} onChange={e=>setPass(e.target.value)} required minLength={6}/>}

<button className="bp" type="submit" disabled={ld} style={{width:"100%",padding:"12px 0"}}>{ld?"…":(mode==="login"?"Accedi":mode==="register"?"Registrati":"Invia link")}</button></form>}

{mode==="login"&&<><span>Non hai un account? <button onClick={()=>{setMode("register");setErr("")}} style={{background:"none",border:"none",color:"var(--blue)",cursor:"pointer",fontSize:12,fontWeight:600}}>Registrati</button></span>
<button onClick={()=>{setMode("reset");setErr("");setResetOk(false)}} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:11}}>Password dimenticata?</button></>}
{mode==="register"&&<span>Hai un account? <button onClick={()=>{setMode("login");setErr("")}} style={{background:"none",border:"none",color:"var(--blue)",cursor:"pointer",fontSize:12,fontWeight:600}}>Accedi</button></span>}
{mode==="reset"&&<button onClick={()=>{setMode("login");setErr("");setResetOk(false)}} style={{background:"none",border:"none",color:"var(--blue)",cursor:"pointer",fontSize:12}}>← Torna al login</button>}
</div></div><p style={{color:"#2A3548",fontSize:10,textAlign:"center",marginTop:20}}>{DISC}</p></div></div>)}

/* ══ SIDEBAR ══ */
const PGS=[{id:"dash",ic:"📊",l:"Dashboard"},{id:"reg",ic:"🗂️",l:"Registro IA"},{id:"docs",ic:"📄",l:"Documenti"},{id:"train",ic:"📚",l:"Formazione"},{id:"alerts",ic:"🔔",l:"Alert"}];

<div style={{flex:1,display:"flex",flexDirection:"column",gap:3}}>{PGS.map(p=><button key={p.id} className={"si"+(pg===p.id?" on":"")} onClick={()=>setPg(p.id)}><span style={{fontSize:15}}>{p.ic}</span>{p.l}</button>)}</div>
<div style={{borderTop:"1px solid var(--border)",paddingTop:14}}><div style={{color:"var(--muted)",fontSize:11,padding:"0 14px",marginBottom:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cn}</div>

/* ══ DASHBOARD ══ */
function Dash({sys,tr,al,docs}){const total=sys.length;const hi=sys.filter(s=>s.category==="alto"||s.category==="vietato").length;const trained=tr.length;const sd=docs.filter(d=>d.status==="signed").length;const td=docs.length||4;
const score=calcScore(sys,docs,tr);const lc=score>=70?"#34D399":score>=40?"#FBBF24":"#F87171";
const bl=[];if(docs.some(d=>d.doc_type==="policy"&&d.status!=="signed"))bl.push({t:"Policy non firmata",s:"Genera e firma dalla sezione Documenti",r:"AI Act + L.132/2025"});
if(docs.some(d=>d.doc_type==="info_dip"&&d.status!=="signed"))bl.push({t:"Informativa dipendenti non firmata",s:"Art. 11 L.132/2025",r:"Art. 11"});
if(trained===0&&total>0)bl.push({t:"Nessuna formazione",s:"Art. 4 AI Act richiede AI literacy",r:"Art. 4"});
if(hi>0)bl.push({t:hi+" sistema/i alto rischio",s:"Verifica nel Registro IA",r:"Art. 5/6"});
return(<div className="fi">
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h1 style={{color:"#fff",fontSize:24,fontWeight:800}}>Dashboard</h1><span className="mono" style={{color:"var(--muted)",fontSize:12}}>Pro</span></div>
<div className="card" style={{marginBottom:16,background:"linear-gradient(135deg,rgba(79,142,247,.03),rgba(52,211,153,.02))",borderColor:"var(--bbr)"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{color:"#8AA8CC",fontSize:13}}>Conformità</span><span className="mono" style={{color:lc,fontSize:22,fontWeight:700}}>{score}%</span></div>
<div className="ptr"><div className="pb" style={{width:score+"%",background:"linear-gradient(90deg,"+lc+","+(score>=70?"#6EE7B7":score>=40?"#FCD34D":"#FCA5A5")+")"}}/></div>
<div style={{display:"flex",justifyContent:"space-between",marginTop:10,color:"var(--muted)",fontSize:11}}><span>Sistemi: {total}</span><span>Docs: {sd}/{td}</span><span>Formazioni: {trained}</span></div></div>
<div className="grid g4" style={{marginBottom:16}}>{[{n:total,l:"Sistemi IA",c:"var(--blue)"},{n:hi,l:"Alto rischio",c:hi?"var(--red)":"var(--green)"},{n:sd+"/"+td,l:"Docs firmati",c:sd>=td?"var(--green)":"var(--yellow)"},{n:trained,l:"Formazioni",c:"var(--purple)"}].map((s,i)=><div key={i} className="kpi"><div className="mono" style={{color:s.c,fontSize:28,fontWeight:700}}>{s.n}</div><div style={{color:"var(--muted)",fontSize:11,marginTop:4}}>{s.l}</div></div>)}</div>
{bl.length>0&&<div style={{background:"var(--rgl)",border:"1px solid rgba(248,113,113,.12)",borderRadius:14,padding:18,marginBottom:16}}><h3 style={{color:"#FCA5A5",fontSize:14,fontWeight:700,marginBottom:10}}>🚨 Azioni bloccanti ({bl.length})</h3>
{bl.map((b,i)=><div key={i} style={{padding:"10px 0",borderBottom:i<bl.length-1?"1px solid rgba(248,113,113,.06)":"none"}}><div style={{color:"#E2E8F0",fontSize:13,fontWeight:600}}>{b.t}</div><div style={{color:"var(--muted)",fontSize:12,marginTop:3}}>{b.s}</div></div>)}</div>}

const csv=()=>{if(!sys.length)return;const esc=(v)=>{const s=String(v||"");return s.indexOf(";")>=0||s.indexOf("\n")>=0?s:s};const h="Nome;Fornitore;Categoria;Stato;Obbligo\n";const r=sys.map(s=>[s.name,s.provider||"",CATS[s.category]?.l||s.category,s.status,esc(s.obligation||"")].join(";")).join("\n");
const b=new Blob(["\uFEFF"+h+r],{type:"text/csv;charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="registro-ia.csv";a.click();URL.revokeObjectURL(u)};

<a href="https://buy.stripe.com/eVq5kDaPJbt9aa65czfYY01" target="_blank" rel="noopener noreferrer" style={{display:"block",background:"linear-gradient(135deg,#4F8EF7,#3B6FD9)",color:"#fff",padding:"13px 24px",borderRadius:10,fontSize:14,fontWeight:600,textDecoration:"none",boxShadow:"0 4px 20px rgba(79,142,247,.25)"}}>Attiva Pro — €29/mese</a>
<button onClick={()=>location.reload()} style={{background:"rgba(255,255,255,.04)",border:"1px solid var(--border)",color:"var(--text)",padding:"11px 24px",borderRadius:10,fontSize:13,cursor:"pointer"}}>Ho pagato — Verifica</button>
<button onClick={logout} style={{background:"none",border:"none",color:"var(--muted)",fontSize:12,cursor:"pointer",marginTop:6}}>← Esci</button></div></div></div>)}

/* ══ APP ══ */
function App(){
const[user,setUser]=useState(null);const[ld,setLd]=useState(true);const[pg,setPg]=useState("dash");
const[co,setCo]=useState(null);const[sys,setSys]=useState([]);const[tr,setTr]=useState([]);const[al,setAl]=useState([]);const[docs,setDocs]=useState([]);
const[sub,setSub]=useState(null);const[subOk,setSubOk]=useState(false);const[subErr,setSubErr]=useState("");
const[toastMsg,setToastMsg]=useState("");const[toastErr,setToastErr]=useState(false);
const toast=(msg,isErr)=>{setToastMsg(msg);setToastErr(!!isErr);setTimeout(()=>setToastMsg(""),3000)};

const chkSub=useCallback(async()=>{try{
const{data,error}=await sb.from("subscriptions").select("*").in("status",["active","canceling"]).in("plan",["pro","enterprise"]);
if(error){setSubErr("Errore: "+error.message);setSubOk(true);return null}
const f=data?.length>0?data[0]:null;if(!f)setSubErr("Nessun abbonamento trovato.");
setSub(f);setSubOk(true);return f}catch(e){setSubErr("Rete: "+e.message);setSubOk(true);return null}},[]);

const load=useCallback(async(uid)=>{try{
let{data:c}=await sb.from("companies").select("*").eq("user_id",uid).single();
if(!c){const um=await sb.auth.getUser();const{data:nc,error}=await sb.from("companies").insert({user_id:uid,name:um?.data?.user?.user_metadata?.company_name||"La mia azienda",sector:"altro",employees:"1",compliance_score:50}).select().single();
if(error)throw error;c=nc;if(c)await sb.from("documents").insert(RDOCS.map(d=>({company_id:c.id,doc_type:d.type,doc_title:d.title,status:"missing"})))}
setCo(c);
if(c){const[{data:s},{data:t},{data:d}]=await Promise.all([sb.from("ai_systems").select("*").eq("company_id",c.id).order("created_at",{ascending:false}),sb.from("training_records").select("*").eq("company_id",c.id).order("completed_at",{ascending:false}),sb.from("documents").select("*").eq("company_id",c.id)]);
setSys(s||[]);setTr(t||[]);setDocs(d||[]);
const ns=calcScore(s||[],d||[],t||[]);if(c.compliance_score!==ns){await sb.from("companies").update({compliance_score:ns}).eq("id",c.id)}}
const{data:a}=await sb.from("alerts").select("*").order("published_at",{ascending:false});setAl(a||[]);
}catch(e){console.error("loadData:",e)}},[]);

useEffect(()=>{sb.auth.getSession().then(async({data:{session:s}})=>{if(s?.user){setUser(s.user);const ok=await chkSub();if(ok)await load(s.user.id)}setLd(false)});
const{data:{subscription:ls}}=sb.auth.onAuthStateChange(async(ev,s)=>{if(s?.user){setUser(s.user);const ok=await chkSub();if(ok)await load(s.user.id)}else{setUser(null);setCo(null);setSub(null);setSubOk(false)}});
return()=>ls.unsubscribe()},[load,chkSub]);

const logout=async()=>{await sb.auth.signOut();setUser(null);setCo(null);setSub(null);setSubOk(false);setSubErr("")};
const refresh=()=>{if(user)load(user.id)};

if(ld)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}><div style={{textAlign:"center"}}><div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#4F8EF7,#3B6FD9)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"#fff",fontSize:14,fontFamily:"'JetBrains Mono'",margin:"0 auto 12px",animation:"pulse 1.5s ease infinite"}}>AI</div><span style={{color:"var(--muted)"}}>Caricamento…</span></div></div>;
if(!user)return<Auth onAuth={async u=>{setUser(u);const s=await chkSub();if(s)await load(u.id)}}/>;
if(!subOk)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}><span style={{color:"var(--muted)"}}>Verifica…</span></div>;
if(!sub)return<PW email={user.email} logout={logout} err={subErr}/>;

return(<div style={{display:"flex",height:"100vh"}}>
<Side pg={pg} setPg={setPg} logout={logout} cn={co?.name||""}/>
<div className="mc" style={{flex:1,overflow:"auto",padding:"24px 28px"}}>
{pg==="dash"&&<Dash sys={sys} tr={tr} al={al} docs={docs}/>}
{pg==="reg"&&<Reg sys={sys} cid={co?.id} refresh={refresh} toast={toast}/>}
{pg==="docs"&&<Docs docs={docs} co={co} sys={sys} cid={co?.id} refresh={refresh} toast={toast}/>}
{pg==="train"&&<Train tr={tr} cid={co?.id} refresh={refresh} toast={toast}/>}
{pg==="alerts"&&<Alerts al={al}/>}
</div><MNav pg={pg} setPg={setPg}/><Toast msg={toastMsg} isErr={toastErr}/></div>)}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
